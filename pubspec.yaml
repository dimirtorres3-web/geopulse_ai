name: geopulse_ai
description: "Mapeo inteligente y reportes ciudadanos de infraestructura vial con IA."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_sign_in: ^6.2.1
  firebase_auth: ^5.0.0
  firebase_core: ^3.0.0
  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0
  camera: ^0.10.5+5
  google_generative_ai: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
